<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logot.png" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Ibytex</title>
  </head>
  <style>
    
    #initial-loader {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.5s ease;
  
}


  .loader-content {
    text-align: center;
  }

  .loader-logo {
    width: 90px;
    margin-bottom: 20px;
    animation: pulse 1.6s infinite ease-in-out;
  }

  .loader-text {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(
      135deg,
      #0072ff 0%,
      #00bfff 40%,
      #e6f7ff 55%,
      #00bfff 70%,
      #0050ff 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .loader-sub {
    color: #aaa;
    font-size: 14px;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
  }
</style>



  <body>

  <!-- 🔥 INITIAL LOADER (Outside Root) -->
  <div id="initial-loader">
    <div class="loader-content">
      <img src="%PUBLIC_URL%/logot.png" class="loader-logo" />

      <h1 class="loader-text">
        Welcome to iBytex
      </h1>

      <p class="loader-sub">
        Loading Secure Exchange Platform...
      </p>
    </div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const loader = document.getElementById("initial-loader");

    // Safety timeout (in case React crashes)
    setTimeout(() => {
      if (loader) loader.style.opacity = "0";
    }, 4000);
  });
</script>


</body>

</html>
