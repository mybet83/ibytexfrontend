<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
  }

  #initial-loader {
    position: fixed;
    inset: 0;
    background: #000;
    display: grid;
    place-items: center; /* ✅ Perfect center */
    z-index: 9999;
    transition: opacity 0.5s ease;
  }

  .loader-content {
    text-align: center;
  }

  .loader-logo {
    width: 100px;
    animation: pulse 1.8s infinite ease-in-out;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .loader-text {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(
      135deg,
      #0072ff 0%,
      #00bfff 40%,
      #e6f7ff 55%,
      #00bfff 70%,
      #0050ff 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .loader-sub {
    color: #aaa;
    font-size: 14px;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
  }
</style>




  <body>

  <!-- 🔥 INITIAL LOADER (Outside Root) -->
  <div id="initial-loader">
    <div class="loader-content">
      <img src="%PUBLIC_URL%/logot.png" class="loader-logo" />

      <h1 class="loader-text">
        Welcome to iBytex
      </h1>

      <p class="loader-sub">
        Loading Secure Exchange Platform...
      </p>
    </div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const loader = document.getElementById("initial-loader");

    // Safety timeout (in case React crashes)
    setTimeout(() => {
      if (loader) loader.style.opacity = "0";
    }, 4000);
  });
</script>
