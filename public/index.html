<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;

  font-family: 'SN Pro', sans-serif;
}

/* FULL SCREEN */
#initial-loader {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #0a0a0a 0%, #000 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}

/* WRAPPER */
.loader-wrapper {
  position: relative;
  width: 260px;
  height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* GLASS CENTER */
.center-glass {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* LOGO */
.loader-logo {
  width: 90px;
  opacity: 0.9;
}

/* ORBIT BASE */
.orbit {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  will-change: transform;
}

/* RING SIZES + SPEED */
.ring1 {
  width: 240px;
  height: 240px;
  animation: rotateSlow 4s linear infinite;
}

.ring2 {
  width: 200px;
  height: 200px;
  animation: rotateReverse 4.5s linear infinite;
}

.ring3 {
  width: 170px;
  height: 170px;
  animation: rotateSlow 5s linear infinite;
}

/* MOVING DOT */
.orbit::after {
  content: "";
  position: absolute;
  top: -4px;
  left: 50%;
  width: 6px;
  height: 6px;
  background: #ffffff;
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ANIMATIONS */
@keyframes rotateSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes rotateReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}
</style>
</head>

<body>

  <!-- 🔥 INITIAL LOADER -->
<div id="initial-loader">
  <div class="loader-wrapper">

    <div class="orbit ring1"></div>
    <div class="orbit ring2"></div>
    <div class="orbit ring3"></div>

    <div class="center-glass">
      <img src="%PUBLIC_URL%/logot.png" class="loader-logo" />
    </div>

  </div>
</div>


  <!-- React Root -->
  <div id="root"></div>

<script>

  window.addEventListener("load", function () {
  const loader = document.getElementById("initial-loader");
  setTimeout(() => {
    loader.style.opacity = "0";
    loader.style.visibility = "hidden";
  }, 4000);
});


  

</script>





</body>
