  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    /* 🔥 FULL SCREEN LOADER */
    #initial-loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: grid;
      place-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .loader-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 🔥 ROTATING GRADIENT RING */
    .loader-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: conic-gradient(
        #0072ff,
        #00c6ff,
        #00f0ff,
        #0072ff
      );
      animation: spin 1.2s linear infinite;
      filter: blur(6px);
    }

    /* Dark inner circle */
    .loader-ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      background: #000;
      border-radius: 50%;
    }

    /* LOGO */
    .loader-logo {
      width: 130px;
      z-index: 2;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }
  </style>
</head>

<body>

  <!-- 🔥 INITIAL LOADER -->
  <div id="initial-loader">
    <div class="loader-wrapper">
      <div class="loader-ring"></div>
      <img src="%PUBLIC_URL%/logot.png" class="loader-logo" alt="IBYTEX Logo" />
    </div>
  </div>


  <!-- React Root -->
  <div id="root"></div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const loader = document.getElementById("initial-loader");

    // Safety timeout (in case React crashes)
    setTimeout(() => {
      if (loader) loader.style.opacity = "0";
    }, 4000);
  });
</script>
